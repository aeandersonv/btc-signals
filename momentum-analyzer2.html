<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WAVE">
<meta name="theme-color" content="#060a10">
<title>WAVE — Momentum Analyzer</title>
<style>
:root {
  --bg:      #060a10;
  --bg2:     #0b1018;
  --bg3:     #101620;
  --bg4:     #151d2a;
  --border:  #1c2a3a;
  --text:    #d0e0f0;
  --muted:   #445566;
  --dim:     #2a3a4a;
  --green:   #00d97e;
  --green2:  #00ff94;
  --red:     #ff3355;
  --blue:    #2196f3;
  --blue2:   #64b5f6;
  --gold:    #ffb830;
  --purple:  #7c6aff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: 'SF Mono', ui-monospace, 'Cascadia Code', monospace; font-size: 13px;
  overscroll-behavior: none; }

/* ── Layout ── */
.app { display: flex; flex-direction: column; height: 100%; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 14px 10px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo { font-size: 1.05rem; font-weight: 700; letter-spacing: .12em;
  background: linear-gradient(90deg, var(--green2), var(--blue2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-sub { font-size: 0.6rem; color: var(--muted); letter-spacing: .08em; margin-left: -4px; }

.pair-btn { background: var(--bg4); color: var(--blue2); border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 6px; font-family: inherit; font-size: 0.8rem;
  cursor: pointer; appearance: none; }
.status-wrap { margin-left: auto; display: flex; align-items: center; gap: 7px; }
.pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.pulse.live { background: var(--green); animation: pulseAnim 2s infinite; }
.pulse.err  { background: var(--red); }
@keyframes pulseAnim { 0%,100%{box-shadow:0 0 0 0 #00d97e55} 50%{box-shadow:0 0 0 5px #00d97e00} }
.last-ts { font-size: 0.65rem; color: var(--muted); }
.refresh-btn { background: transparent; color: var(--green); border: 1px solid var(--green);
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.78rem; }

/* Settings strip */
.settings-strip { background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 6px 14px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.sfield { display: flex; align-items: center; gap: 5px; }
.sfield label { color: var(--muted); font-size: 0.68rem; white-space: nowrap; }
.sfield input { background: var(--bg4); color: var(--gold); border: 1px solid var(--border);
  width: 52px; padding: 3px 6px; border-radius: 4px; font-family: inherit; font-size: 0.75rem; text-align: right; }
.sfield select { background: var(--bg4); color: var(--text); border: 1px solid var(--border);
  padding: 3px 6px; border-radius: 4px; font-family: inherit; font-size: 0.75rem; cursor: pointer; }
.fee-summary { margin-left: auto; font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
.fee-summary b { color: var(--gold); }

/* Scroll area */
.scroll { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: calc(10px + var(--safe-bot));
  display: flex; flex-direction: column; gap: 10px; }

/* Alert banner */
.alert-banner { display: none; background: #00d97e18; border: 1px solid var(--green);
  border-radius: 8px; padding: 12px 14px; }
.alert-banner.show { display: block; }
.alert-banner.sell-alert { background: #ff335518; border-color: var(--red); }
.ab-head { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.ab-signal { font-size: 1.5rem; font-weight: 700; margin: 4px 0; }
.ab-signal.buy  { color: var(--green2); }
.ab-signal.hold { color: var(--muted); }
.ab-detail { font-size: 0.72rem; color: var(--muted); line-height: 1.6; }
.ab-detail b { color: var(--text); }

/* Horizon cards */
.horizons-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media (min-width: 600px) { .horizons-grid { grid-template-columns: repeat(3, 1fr); } }

.hcard { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 11px; }
.hcard.hi-conf  { border-color: var(--green); box-shadow: 0 0 14px #00d97e1a; }
.hcard.mid-conf { border-color: var(--gold); }
.hcard.lo-conf  { border-color: var(--border); }
.hcard.loading  { opacity: .5; }

.hcard-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.horizon-label { color: var(--blue2); font-size: 0.85rem; font-weight: 700; }
.conf-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 3px; }
.conf-badge.hi  { background: #00d97e22; color: var(--green2); border: 1px solid var(--green); }
.conf-badge.mid { background: #ffb83022; color: var(--gold);   border: 1px solid var(--gold); }
.conf-badge.lo  { background: #44556622; color: var(--muted);  border: 1px solid var(--dim); }

.conf-bar-wrap { height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.conf-bar { height: 100%; border-radius: 3px; transition: width .5s ease; }

.hcard-stats { display: flex; flex-direction: column; gap: 3px; }
.stat-row { display: flex; justify-content: space-between; }
.stat-label { color: var(--muted); font-size: 0.67rem; }
.stat-val   { font-size: 0.72rem; }
.stat-val.pos { color: var(--green); }
.stat-val.neg { color: var(--red); }
.stat-val.neu { color: var(--text); }
.stat-val.warn { color: var(--gold); }

/* Physics panel */
.phys-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.panel-title { font-size: 0.68rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 10px; }
.phys-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media (min-width: 500px) { .phys-grid { grid-template-columns: repeat(4, 1fr); } }

.phys-cell { background: var(--bg3); border-radius: 6px; padding: 8px; }
.phys-cell-label { font-size: 0.65rem; color: var(--muted); margin-bottom: 4px; }
.phys-cell-val { font-size: 0.85rem; font-weight: 700; }
.phys-cell-sub  { font-size: 0.62rem; color: var(--muted); margin-top: 2px; }

/* Data status */
.data-status { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.ds-row { display: flex; justify-content: space-between; align-items: center;
  padding: 3px 0; border-bottom: 1px solid var(--bg3); }
.ds-row:last-child { border-bottom: none; }
.ds-label { color: var(--muted); font-size: 0.68rem; }
.ds-val   { font-size: 0.7rem; }

/* Notif prompt */
.notif-prompt { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.notif-prompt p { font-size: 0.72rem; color: var(--muted); flex: 1; min-width: 180px; }
.notif-btn { background: var(--bg4); color: var(--blue2); border: 1px solid var(--blue);
  padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 0.75rem; }

/* Toast */
.toast { position: fixed; bottom: calc(24px + var(--safe-bot)); left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--green); color: var(--green2);
  padding: 8px 18px; border-radius: 20px; font-size: 0.78rem; white-space: nowrap;
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }

/* Spinner */
.spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--dim);
  border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 30px; }
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="logo">WAVE</div>
      <div class="logo-sub">MOMENTUM ANALYZER</div>
    </div>
    <select class="pair-btn" id="pairSelect" onchange="onPairChange()">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="SOLUSDT">SOL/USDT</option>
      <option value="XRPUSDT">XRP/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
    </select>
    <div class="status-wrap">
      <div class="pulse" id="pulse"></div>
      <div class="last-ts" id="lastTs">—</div>
      <button class="refresh-btn" onclick="runAnalysis()">↻</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-strip">
    <div class="sfield">
      <label>Maker%</label>
      <input type="number" id="makerFee" value="0.10" step="0.01" min="0" max="2" oninput="saveSettings();updateFeeDisplay()">
    </div>
    <div class="sfield">
      <label>Taker%</label>
      <input type="number" id="takerFee" value="0.10" step="0.01" min="0" max="2" oninput="saveSettings();updateFeeDisplay()">
    </div>
    <div class="sfield">
      <label>Min confidence</label>
      <input type="number" id="minConf" value="55" step="1" min="50" max="95" oninput="saveSettings()">
      <label>%</label>
    </div>
    <div class="sfield">
      <label>Auto-refresh</label>
      <select id="autoRefresh" onchange="saveSettings();resetTimer()">
        <option value="0">Off</option>
        <option value="60">1 min</option>
        <option value="300" selected>5 min</option>
        <option value="900">15 min</option>
      </select>
    </div>
    <div class="fee-summary">RT fee: <b id="rtFee">0.20%</b> &nbsp;|&nbsp; Need: <b id="needMove">1.20%</b></div>
  </div>

  <!-- Scroll body -->
  <div class="scroll" id="scroll">
    <div class="empty">Select a pair and tap ↻ to analyze</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const BASE = 'https://data-api.binance.vision/api/v3/klines';

// Candle sources: interval, max candles to fetch, label
const SOURCES = [
  { interval: '5m',  limit: 1000, label: '5m'  },
  { interval: '15m', limit: 1000, label: '15m' },
  { interval: '1h',  limit: 500,  label: '1h'  },
  { interval: '4h',  limit: 180,  label: '4h'  },
  { interval: '1d',  limit: 90,   label: '1d'  },
];

// Prediction horizons: label, minutes forward, which candle sources feed it
const HORIZONS = [
  { label: '15m',  minutes: 15,   sources: ['5m','15m'],      minSamples: 15 },
  { label: '30m',  minutes: 30,   sources: ['5m','15m'],      minSamples: 15 },
  { label: '1h',   minutes: 60,   sources: ['15m','1h'],      minSamples: 15 },
  { label: '6h',   minutes: 360,  sources: ['1h','4h'],       minSamples: 12 },
  { label: '24h',  minutes: 1440, sources: ['4h','1d'],       minSamples: 10 },
];

// KNN config
const K = 10;             // neighbours to retrieve per source
const LOOKBACK = 4;       // how many past candles build the fingerprint
const DECAY_HALF = 0.5;   // recency decay: weight halves at this fraction of history depth

// ═══════════════════════════════════════════════════════════
//  SETTINGS PERSISTENCE
// ═══════════════════════════════════════════════════════════
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('wave_settings') || '{}');
    if (s.pair)       document.getElementById('pairSelect').value  = s.pair;
    if (s.makerFee !== undefined) document.getElementById('makerFee').value = s.makerFee;
    if (s.takerFee !== undefined) document.getElementById('takerFee').value = s.takerFee;
    if (s.minConf   !== undefined) document.getElementById('minConf').value  = s.minConf;
    if (s.autoRefresh !== undefined) document.getElementById('autoRefresh').value = s.autoRefresh;
  } catch(e) {}
  updateFeeDisplay();
}
function saveSettings() {
  try {
    localStorage.setItem('wave_settings', JSON.stringify({
      pair:        document.getElementById('pairSelect').value,
      makerFee:    document.getElementById('makerFee').value,
      takerFee:    document.getElementById('takerFee').value,
      minConf:     document.getElementById('minConf').value,
      autoRefresh: document.getElementById('autoRefresh').value,
    }));
  } catch(e) {}
}
function updateFeeDisplay() {
  const rt = (parseFloat(document.getElementById('makerFee').value)||0)
           + (parseFloat(document.getElementById('takerFee').value)||0);
  document.getElementById('rtFee').textContent   = rt.toFixed(2) + '%';
  document.getElementById('needMove').textContent = (1 + rt).toFixed(2) + '%';
}

// ═══════════════════════════════════════════════════════════
//  DATA FETCH
// ═══════════════════════════════════════════════════════════
async function fetchCandles(symbol, interval, limit) {
  const url = `${BASE}?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const raw = await res.json();
  return raw.map(k => ({
    t: k[0], o: +k[1], h: +k[2], l: +k[3], c: +k[4], v: +k[5],
  }));
}

// ═══════════════════════════════════════════════════════════
//  PHYSICS: velocity, acceleration, jerk
// ═══════════════════════════════════════════════════════════
function derivative(arr) {
  // central difference, forward/backward at edges
  return arr.map((v, i) => {
    if (i === 0)           return arr[1] - arr[0];
    if (i === arr.length-1) return arr[i] - arr[i-1];
    return (arr[i+1] - arr[i-1]) / 2;
  });
}

function calcPhysicsSeries(candles) {
  const closes = candles.map(c => c.c);
  const vel = derivative(closes);
  const acc = derivative(vel);
  const jrk = derivative(acc);
  // normalise to % of price so values are scale-invariant
  return candles.map((c, i) => ({
    t:   c.t,
    c:   c.c,
    v:   c.v,
    vel: vel[i] / c.c * 100,
    acc: acc[i] / c.c * 100,
    jrk: jrk[i] / c.c * 100,
  }));
}

// ═══════════════════════════════════════════════════════════
//  FINGERPRINT: vector of [vel,acc,jrk] × LOOKBACK steps
// ═══════════════════════════════════════════════════════════
function buildFingerprint(series, endIdx) {
  // endIdx = the candle we're "at" — reach back LOOKBACK steps
  if (endIdx < LOOKBACK) return null;
  const vec = [];
  for (let i = endIdx - LOOKBACK + 1; i <= endIdx; i++) {
    vec.push(series[i].vel, series[i].acc, series[i].jrk);
  }
  return vec;
}

function magnitude(v) {
  return Math.sqrt(v.reduce((s, x) => s + x*x, 0));
}

function cosineSim(a, b) {
  let dot = 0, ma = 0, mb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; ma += a[i]*a[i]; mb += b[i]*b[i]; }
  const denom = Math.sqrt(ma) * Math.sqrt(mb);
  return denom < 1e-12 ? 0 : dot / denom;
}

// ═══════════════════════════════════════════════════════════
//  KNN PATTERN MATCH
// ═══════════════════════════════════════════════════════════
// Returns confidence (0-1) and metadata for one source+horizon combo
function knnConfidence(series, horizonMinutes, candleMinutes) {
  const n = series.length;
  const horizonCandles = Math.round(horizonMinutes / candleMinutes);

  // Need: LOOKBACK history + horizonCandles future + buffer
  if (n < LOOKBACK + horizonCandles + 5) return null;

  // Build current fingerprint (last candle we have full data for)
  // Exclude the very last candle if it's likely incomplete
  const curIdx = n - 1;
  const curFP = buildFingerprint(series, curIdx);
  if (!curFP) return null;

  // Collect all historical fingerprints that have enough future data
  const maxHistIdx = n - 1 - horizonCandles; // must have future data available

  const candidates = [];
  for (let i = LOOKBACK; i <= maxHistIdx; i++) {
    const fp = buildFingerprint(series, i);
    if (!fp) continue;

    const sim = cosineSim(curFP, fp);

    // Recency weight: exponential decay — older = less weight
    // position 0 = oldest, maxHistIdx = most recent
    const age = (maxHistIdx - i) / maxHistIdx; // 0=recent, 1=old
    const recencyWeight = Math.exp(-age / DECAY_HALF);

    // Future outcome: did price rise ≥1% within horizonCandles?
    const entryPrice = series[i].c;
    let hit = false;
    for (let f = 1; f <= horizonCandles; f++) {
      if (series[i + f].c >= entryPrice * 1.01) { hit = true; break; }
    }

    candidates.push({ sim, recencyWeight, hit });
  }

  if (candidates.length === 0) return null;

  // Sort by weighted similarity descending
  candidates.sort((a, b) => (b.sim * b.recencyWeight) - (a.sim * a.recencyWeight));

  // Take top K
  const neighbours = candidates.slice(0, K);

  // Weighted hit rate
  let weightedHits = 0, weightedTotal = 0;
  for (const nb of neighbours) {
    const w = nb.sim * nb.recencyWeight;
    weightedTotal += w;
    if (nb.hit) weightedHits += w;
  }

  const confidence = weightedTotal > 0 ? weightedHits / weightedTotal : 0;

  // Also compute avg similarity of neighbours (quality indicator)
  const avgSim = neighbours.reduce((s, n) => s + n.sim, 0) / neighbours.length;

  return {
    confidence,
    n: neighbours.length,
    totalCandidates: candidates.length,
    avgSim,
    neighbours, // for debugging
  };
}

// ═══════════════════════════════════════════════════════════
//  CANDLEMINUTES lookup
// ═══════════════════════════════════════════════════════════
const CANDLE_MINUTES = { '5m': 5, '15m': 15, '1h': 60, '4h': 240, '1d': 1440 };

// ═══════════════════════════════════════════════════════════
//  MAIN ANALYSIS
// ═══════════════════════════════════════════════════════════
let analysisRunning = false;
let autoTimer = null;

async function runAnalysis() {
  if (analysisRunning) return;
  analysisRunning = true;

  const symbol = document.getElementById('pairSelect').value;
  const minConf = parseFloat(document.getElementById('minConf').value) / 100 || 0.55;
  const makerFee = parseFloat(document.getElementById('makerFee').value) || 0.1;
  const takerFee = parseFloat(document.getElementById('takerFee').value) || 0.1;
  const rtFee = makerFee + takerFee;

  const pulse = document.getElementById('pulse');
  pulse.className = 'pulse';

  setScroll(loadingHTML());

  // ── Fetch all sources ──
  const sourceData = {};
  const fetchStatus = {};
  for (const src of SOURCES) {
    try {
      const candles = await fetchCandles(symbol, src.interval, src.limit);
      sourceData[src.label] = calcPhysicsSeries(candles);
      fetchStatus[src.label] = { ok: true, n: candles.length };
    } catch(e) {
      fetchStatus[src.label] = { ok: false, err: e.message };
    }
    await delay(100);
  }

  // ── Current physics (from 5m, most granular) ──
  const livePhysics = (() => {
    const s = sourceData['5m'] || sourceData['15m'];
    if (!s || !s.length) return null;
    const last = s[s.length - 1];
    return { price: last.c, vel: last.vel, acc: last.acc, jrk: last.jrk };
  })();

  // ── KNN for each horizon ──
  const horizonResults = [];
  for (const hz of HORIZONS) {
    const results = [];
    for (const srcLabel of hz.sources) {
      const series = sourceData[srcLabel];
      if (!series) continue;
      const cm = CANDLE_MINUTES[srcLabel];
      const r = knnConfidence(series, hz.minutes, cm);
      if (r) results.push({ srcLabel, ...r });
    }

    // Combine results across sources: weighted by n and avgSim
    let combinedConf = null, combinedN = 0;
    if (results.length > 0) {
      let wSum = 0, wConf = 0;
      for (const r of results) {
        const w = r.n * r.avgSim;
        wConf += r.confidence * w;
        wSum  += w;
        combinedN = Math.max(combinedN, r.n);
      }
      combinedConf = wSum > 0 ? wConf / wSum : null;
    }

    horizonResults.push({
      hz,
      confidence: combinedConf,
      n: combinedN,
      sources: results,
    });
  }

  // ── Overall signal ──
  const minSamples = 10;
  const validResults = horizonResults.filter(r => r.confidence !== null && r.n >= minSamples);
  const triggeredHorizons = validResults.filter(r => r.confidence >= minConf);

  const bestHorizon = triggeredHorizons.length > 0
    ? triggeredHorizons.reduce((a, b) => a.confidence > b.confidence ? a : b)
    : null;

  const overallSignal = bestHorizon ? 'buy' : 'hold';

  // ── Notification ──
  if (bestHorizon && Notification.permission === 'granted') {
    try {
      new Notification('WAVE — BUY Signal', {
        body: `${symbol}: ${(bestHorizon.confidence*100).toFixed(0)}% confidence on ${bestHorizon.hz.label} horizon`,
        icon: '',
        tag: 'wave-signal',
        renotify: true,
      });
    } catch(e) {}
  }

  // ── Render ──
  setScroll(renderAll({
    symbol, livePhysics, horizonResults, overallSignal,
    bestHorizon, fetchStatus, minConf, rtFee,
  }));

  pulse.className = 'pulse live';
  document.getElementById('lastTs').textContent = new Date().toLocaleTimeString();

  analysisRunning = false;
  saveSettings();
  resetTimer();
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function renderAll({ symbol, livePhysics, horizonResults, overallSignal,
                     bestHorizon, fetchStatus, minConf, rtFee }) {
  let html = '';

  // ── Alert banner ──
  const isBuy = overallSignal === 'buy';
  const confPct = bestHorizon ? (bestHorizon.confidence*100).toFixed(0) : null;
  html += `<div class="alert-banner ${isBuy ? 'show' : ''}">
    <div class="ab-head">Consensus Signal</div>
    <div class="ab-signal buy">${isBuy ? '▲ BUY — ' + symbol : ''}</div>
    ${isBuy ? `<div class="ab-detail">
      <b>${confPct}% confidence</b> on <b>${bestHorizon.hz.label}</b> horizon
      &nbsp;|&nbsp; Target: +1.00%
      &nbsp;|&nbsp; After fees: <b>+${(1 - rtFee).toFixed(2)}%</b> net<br>
      Auto-sell at close of ${bestHorizon.hz.label} interval
    </div>` : ''}
  </div>`;

  if (!isBuy) {
    html += `<div class="alert-banner show" style="background:#44556611;border-color:var(--muted)">
      <div class="ab-head">Consensus Signal</div>
      <div class="ab-signal hold">— HOLD / WAIT</div>
      <div class="ab-detail">No horizon reached ${(minConf*100).toFixed(0)}% confidence threshold</div>
    </div>`;
  }

  // ── Live physics ──
  if (livePhysics) {
    const p = livePhysics;
    const fc = v => v >= 0 ? 'pos' : 'neg';
    html += `<div class="phys-panel">
      <div class="panel-title">Live Physics (5m candles) — ${symbol}</div>
      <div class="phys-grid">
        <div class="phys-cell">
          <div class="phys-cell-label">Price</div>
          <div class="phys-cell-val" style="color:var(--text)">$${p.price.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
          <div class="phys-cell-sub">Current</div>
        </div>
        <div class="phys-cell">
          <div class="phys-cell-label">⚡ Velocity</div>
          <div class="phys-cell-val ${fc(p.vel)}">${fmtPct(p.vel)}</div>
          <div class="phys-cell-sub">%/candle</div>
        </div>
        <div class="phys-cell">
          <div class="phys-cell-label">🚀 Acceleration</div>
          <div class="phys-cell-val ${fc(p.acc)}">${fmtPct(p.acc)}</div>
          <div class="phys-cell-sub">%/candle²</div>
        </div>
        <div class="phys-cell">
          <div class="phys-cell-label">⚙️ Jerk</div>
          <div class="phys-cell-val ${fc(p.jrk)}">${fmtPct(p.jrk)}</div>
          <div class="phys-cell-sub">%/candle³</div>
        </div>
      </div>
    </div>`;
  }

  // ── Horizon cards ──
  html += `<div class="panel-title" style="padding:2px 2px">Prediction Horizons — KNN Pattern Match</div>`;
  html += `<div class="horizons-grid">`;
  for (const r of horizonResults) {
    const conf = r.confidence;
    const pct  = conf !== null ? (conf * 100).toFixed(0) : null;
    const tier = conf === null ? 'lo'
               : conf >= minConf ? 'hi'
               : conf >= minConf * 0.85 ? 'mid' : 'lo';
    const barColor = tier === 'hi' ? 'var(--green)' : tier === 'mid' ? 'var(--gold)' : 'var(--dim)';
    const barW = conf !== null ? Math.round(conf * 100) : 0;

    const srcSummary = r.sources.map(s =>
      `${s.srcLabel}: ${(s.confidence*100).toFixed(0)}% (N=${s.n})`
    ).join(' · ');

    html += `<div class="hcard ${tier}-conf">
      <div class="hcard-top">
        <div class="horizon-label">${r.hz.label}</div>
        <div class="conf-badge ${tier}">${pct !== null ? pct+'%' : '—'}</div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-bar" style="width:${barW}%;background:${barColor}"></div>
      </div>
      <div class="hcard-stats">
        <div class="stat-row">
          <div class="stat-label">Confidence</div>
          <div class="stat-val ${tier==='hi'?'pos':tier==='mid'?'warn':'neu'}">${pct !== null ? pct+'%' : 'N/A'}</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">Neighbours</div>
          <div class="stat-val neu">${r.n > 0 ? 'K='+r.n : '—'}</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">Signal</div>
          <div class="stat-val ${tier==='hi'?'pos':'neu'}">${tier==='hi'?'▲ BUY':'— wait'}</div>
        </div>
        ${r.sources.length > 0 ? `<div class="stat-row" style="flex-direction:column;align-items:flex-start;gap:1px">
          <div class="stat-label" style="margin-bottom:2px">Sources</div>
          ${r.sources.map(s=>`<div class="stat-val neu" style="font-size:0.62rem">${s.srcLabel}: ${(s.confidence*100).toFixed(0)}% N=${s.n} sim=${s.avgSim.toFixed(2)}</div>`).join('')}
        </div>` : ''}
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── Data status ──
  html += `<div class="data-status">
    <div class="panel-title" style="margin-bottom:8px">Data Sources</div>
    ${SOURCES.map(src => {
      const st = fetchStatus[src.label];
      return `<div class="ds-row">
        <div class="ds-label">${src.label} candles</div>
        <div class="ds-val" style="color:${st.ok?'var(--green)':'var(--red)'}">
          ${st.ok ? '✓ ' + st.n + ' candles' : '✗ ' + st.err}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // ── Notification prompt ──
  if (Notification.permission === 'default') {
    html += `<div class="notif-prompt">
      <p>Enable notifications to get alerts when a BUY signal fires while the app is open.</p>
      <button class="notif-btn" onclick="requestNotifPermission()">Enable Alerts</button>
    </div>`;
  } else if (Notification.permission === 'granted') {
    html += `<div class="notif-prompt">
      <p style="color:var(--green)">✓ Notifications enabled. You'll be alerted on BUY signals.</p>
    </div>`;
  }

  return html;
}

function loadingHTML() {
  return `
    <div class="phys-panel" style="opacity:.4">
      <div class="panel-title"><span class="spinner"></span> &nbsp;Fetching data &amp; running pattern match…</div>
      <div style="color:var(--muted);font-size:0.72rem;margin-top:8px">
        Pulling 5 candle timeframes · Computing V/A/J series · Running KNN search
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function setScroll(html) { document.getElementById('scroll').innerHTML = html; }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(4) + '%'; }

function onPairChange() { saveSettings(); runAnalysis(); }

async function requestNotifPermission() {
  const perm = await Notification.requestPermission();
  showToast(perm === 'granted' ? '✓ Notifications enabled' : 'Notifications blocked');
  if (perm !== 'default') runAnalysis(); // re-render prompt state
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function resetTimer() {
  clearInterval(autoTimer);
  const secs = parseInt(document.getElementById('autoRefresh').value);
  if (secs > 0) autoTimer = setInterval(runAnalysis, secs * 1000);
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
loadSettings();
resetTimer();
</script>
</body>
</html>
