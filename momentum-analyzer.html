<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Momentum Analyzer</title>
<style>
  :root {
    --bg: #070b12;
    --bg2: #0d1320;
    --bg3: #111927;
    --border: #1e2d42;
    --text: #c8d8e8;
    --muted: #506070;
    --green: #00e87a;
    --red: #ff3d5a;
    --blue: #38b4ff;
    --gold: #f5c542;
    --accent: #7b5cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace;
         font-size: 13px; min-height: 100vh; }

  /* Header */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border);
             padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .logo { color: var(--green); font-size: 1rem; font-weight: bold; letter-spacing: 0.05em; }
  .pair-select { background: var(--bg3); color: var(--text); border: 1px solid var(--border);
                 padding: 5px 10px; border-radius: 4px; font-family: inherit; font-size: 0.8rem; cursor: pointer; }
  .refresh-btn { background: transparent; color: var(--green); border: 1px solid var(--green);
                 padding: 5px 14px; border-radius: 4px; cursor: pointer; font-family: inherit;
                 font-size: 0.8rem; margin-left: auto; }
  .refresh-btn:hover { background: #00e87a18; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .last-update { color: var(--muted); font-size: 0.72rem; }

  /* Fee bar */
  .fee-bar { background: var(--bg2); border-bottom: 1px solid var(--border);
             padding: 6px 16px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .fee-bar label { color: var(--muted); font-size: 0.72rem; }
  .fee-bar input { background: var(--bg3); color: var(--gold); border: 1px solid var(--border);
                   width: 60px; padding: 3px 6px; border-radius: 3px; font-family: inherit;
                   font-size: 0.78rem; text-align: right; }
  .fee-info { color: var(--muted); font-size: 0.7rem; margin-left: auto; }
  .fee-info span { color: var(--gold); }

  /* Main grid */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

  /* Timeframe card */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
           padding: 12px; position: relative; overflow: hidden; }
  .card.signal-buy { border-color: var(--green); box-shadow: 0 0 12px #00e87a22; }
  .card.signal-sell { border-color: var(--red); box-shadow: 0 0 12px #ff3d5a22; }
  .card.signal-hold { border-color: var(--muted); }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .tf-label { color: var(--blue); font-size: 0.9rem; font-weight: bold; }
  .signal-badge { font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 3px; }
  .signal-badge.buy { background: #00e87a22; color: var(--green); border: 1px solid var(--green); }
  .signal-badge.sell { background: #ff3d5a22; color: var(--red); border: 1px solid var(--red); }
  .signal-badge.hold { background: #50607033; color: var(--muted); border: 1px solid var(--muted); }
  .signal-badge.loading { color: var(--muted); border: 1px solid #1e2d42; }

  /* Price */
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .price { font-size: 1.1rem; color: var(--text); }
  .price-chg { font-size: 0.78rem; }
  .price-chg.up { color: var(--green); }
  .price-chg.dn { color: var(--red); }

  /* Metrics */
  .metrics { display: flex; flex-direction: column; gap: 4px; }
  .metric-row { display: flex; justify-content: space-between; align-items: center; }
  .metric-label { color: var(--muted); font-size: 0.7rem; }
  .metric-val { font-size: 0.78rem; }
  .metric-val.pos { color: var(--green); }
  .metric-val.neg { color: var(--red); }
  .metric-val.neu { color: var(--text); }

  /* Mini bar for score */
  .score-row { margin-top: 8px; }
  .score-track { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 3px; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* Signal summary */
  .summary-card { grid-column: 1 / -1; background: var(--bg2); border: 1px solid var(--border);
                  border-radius: 8px; padding: 14px; }
  .summary-title { color: var(--muted); font-size: 0.72rem; margin-bottom: 10px;
                   text-transform: uppercase; letter-spacing: 0.08em; }
  .signal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 400px) { .signal-grid { grid-template-columns: repeat(2, 1fr); } }
  .sig-cell { text-align: center; padding: 6px; background: var(--bg3); border-radius: 4px; }
  .sig-cell .tf { color: var(--muted); font-size: 0.65rem; }
  .sig-cell .sig { font-size: 0.85rem; font-weight: bold; margin-top: 2px; }

  /* Overall signal */
  .overall { margin-top: 12px; padding: 12px; border-radius: 6px; text-align: center; }
  .overall.buy { background: #00e87a15; border: 1px solid var(--green); }
  .overall.sell { background: #ff3d5a15; border: 1px solid var(--red); }
  .overall.hold { background: #50607015; border: 1px solid var(--muted); }
  .overall-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .overall-signal { font-size: 1.4rem; font-weight: bold; letter-spacing: 0.05em; }
  .overall-signal.buy { color: var(--green); }
  .overall-signal.sell { color: var(--red); }
  .overall-signal.hold { color: var(--muted); }
  .overall-detail { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  /* Fee impact */
  .fee-impact { margin-top: 8px; font-size: 0.72rem; color: var(--gold); }
  .needed { color: var(--gold); }

  .loading-overlay { position: absolute; inset: 0; background: #070b12cc;
                     display: flex; align-items: center; justify-content: center;
                     font-size: 0.75rem; color: var(--muted); border-radius: 8px; }
  .error-msg { color: var(--red); font-size: 0.72rem; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ MOMENTUM</div>
  <select class="pair-select" id="pairSelect" onchange="refresh()">
    <option value="BTCUSDT">BTC/USDT</option>
    <option value="ETHUSDT">ETH/USDT</option>
    <option value="SOLUSDT">SOL/USDT</option>
    <option value="XRPUSDT">XRP/USDT</option>
    <option value="BNBUSDT">BNB/USDT</option>
  </select>
  <div class="status-dot" id="statusDot"></div>
  <div class="last-update" id="lastUpdate">—</div>
  <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
</div>

<div class="fee-bar">
  <label>Maker fee %</label>
  <input type="number" id="makerFee" value="0.1" step="0.01" min="0" max="2" onchange="recalcFees()">
  <label>Taker fee %</label>
  <input type="number" id="takerFee" value="0.1" step="0.01" min="0" max="2" onchange="recalcFees()">
  <div class="fee-info">Round-trip cost: <span id="roundTrip">0.20%</span> &nbsp;|&nbsp; Min move to profit: <span id="minMove">0.20%</span></div>
</div>

<div class="grid" id="grid">
  <div style="grid-column:1/-1;color:var(--muted);padding:20px;text-align:center;">
    Select a pair and click Refresh to load data.
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────
const BASE = 'https://data-api.binance.vision/api/v3/klines';
const FALLBACK = 'https://api.binance.us/api/v3/klines'; // fallback if needed

const TIMEFRAMES = [
  { label: '5m',  interval: '5m',  limit: 30, weight: 0.15, minutes: 5  },
  { label: '15m', interval: '15m', limit: 30, weight: 0.25, minutes: 15 },
  { label: '1h',  interval: '1h',  limit: 30, weight: 0.35, minutes: 60 },
  { label: '1d',  interval: '1d',  limit: 14, weight: 0.25, minutes: 1440 },
];

// ─── Fetch ────────────────────────────────────────────────
async function fetchOHLCV(symbol, interval, limit) {
  const url = `${BASE}?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const raw = await res.json();
  return raw.map(k => ({
    t: k[0],
    o: parseFloat(k[1]),
    h: parseFloat(k[2]),
    l: parseFloat(k[3]),
    c: parseFloat(k[4]),
    v: parseFloat(k[5]),
  }));
}

// ─── Physics ──────────────────────────────────────────────
// Velocity  = rate of close-price change per candle ($ / candle)
// Acceleration = change in velocity per candle
// Jerk = change in acceleration per candle
function calcPhysics(candles) {
  const closes = candles.map(c => c.c);
  const n = closes.length;

  // Velocity: first derivative (central difference where possible)
  const vel = closes.map((c, i) => {
    if (i === 0) return closes[1] - closes[0];
    if (i === n-1) return closes[n-1] - closes[n-2];
    return (closes[i+1] - closes[i-1]) / 2;
  });

  // Acceleration: second derivative
  const acc = vel.map((v, i) => {
    if (i === 0) return vel[1] - vel[0];
    if (i === n-1) return vel[n-1] - vel[n-2];
    return (vel[i+1] - vel[i-1]) / 2;
  });

  // Jerk: third derivative
  const jrk = acc.map((a, i) => {
    if (i === 0) return acc[1] - acc[0];
    if (i === n-1) return acc[n-1] - acc[n-2];
    return (acc[i+1] - acc[i-1]) / 2;
  });

  // Latest values (last candle)
  const lastVel = vel[n-1];
  const lastAcc = acc[n-1];
  const lastJrk = jrk[n-1];

  // Normalise to % per candle for cross-timeframe comparison
  const price = closes[n-1];
  const velPct = (lastVel / price) * 100;
  const accPct = (lastAcc / price) * 100;
  const jrkPct = (lastJrk / price) * 100;

  // Momentum score: weighted sum of derivatives
  // Positive = upward pressure, negative = downward
  // Jerk tells us if acceleration itself is growing (conviction) or fading
  const score = velPct * 0.5 + accPct * 0.35 + jrkPct * 0.15;

  // Volume trend (recent 5 vs prior 10)
  const vols = candles.map(c => c.v);
  const recentVol = avg(vols.slice(-5));
  const priorVol  = avg(vols.slice(-15, -5));
  const volRatio  = priorVol > 0 ? recentVol / priorVol : 1;

  return { velPct, accPct, jrkPct, score, volRatio, price, closes };
}

function avg(arr) { return arr.reduce((s,v) => s+v, 0) / arr.length; }

// ─── Signal ───────────────────────────────────────────────
// BUY  signal: score > threshold AND volume confirms
// SELL signal: score < -threshold (or reverse)
// HOLD: inconclusive
function deriveSignal(physics, feePct) {
  const { score, volRatio } = physics;
  const threshold = feePct; // must exceed round-trip cost to be worth it
  const volConfirm = volRatio >= 0.8; // volume not collapsing

  if (score > threshold && volConfirm)  return 'buy';
  if (score < -threshold && volConfirm) return 'sell';
  return 'hold';
}

// ─── Render ───────────────────────────────────────────────
function fmtPct(n) {
  const s = n >= 0 ? '+' : '';
  return `${s}${n.toFixed(4)}%`;
}

function scoreColor(s) {
  if (s > 0.05) return '#00e87a';
  if (s < -0.05) return '#ff3d5a';
  return '#506070';
}

function renderCard(tf, candles, physics, signal, roundTripPct) {
  const { velPct, accPct, jrkPct, score, volRatio, price } = physics;
  const lastC = candles[candles.length - 1];
  const prevC = candles[candles.length - 2];
  const chgPct = ((lastC.c - prevC.c) / prevC.c) * 100;
  const chgDir = chgPct >= 0 ? 'up' : 'dn';
  const chgSign = chgPct >= 0 ? '+' : '';

  // Normalised score bar (clamp -2 to +2 → 0-100%)
  const barPct = Math.min(100, Math.max(0, ((score + 2) / 4) * 100));
  const barColor = score > roundTripPct ? '#00e87a' : score < -roundTripPct ? '#ff3d5a' : '#506070';

  const sigClass = signal === 'buy' ? 'buy' : signal === 'sell' ? 'sell' : 'hold';
  const sigLabel = signal === 'buy' ? '▲ BUY' : signal === 'sell' ? '▼ SELL' : '— HOLD';

  const velClass = velPct >= 0 ? 'pos' : 'neg';
  const accClass = accPct >= 0 ? 'pos' : 'neg';
  const jrkClass = jrkPct >= 0 ? 'pos' : 'neg';

  return `
    <div class="card signal-${signal}">
      <div class="card-header">
        <div class="tf-label">${tf.label}</div>
        <div class="signal-badge ${sigClass}">${sigLabel}</div>
      </div>
      <div class="price-row">
        <div class="price">$${price.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
        <div class="price-chg ${chgDir}">${chgSign}${chgPct.toFixed(3)}%</div>
      </div>
      <div class="metrics">
        <div class="metric-row">
          <div class="metric-label">⚡ Velocity</div>
          <div class="metric-val ${velClass}">${fmtPct(velPct)}/candle</div>
        </div>
        <div class="metric-row">
          <div class="metric-label">🚀 Acceleration</div>
          <div class="metric-val ${accClass}">${fmtPct(accPct)}/candle²</div>
        </div>
        <div class="metric-row">
          <div class="metric-label">⚙️ Jerk</div>
          <div class="metric-val ${jrkClass}">${fmtPct(jrkPct)}/candle³</div>
        </div>
        <div class="metric-row">
          <div class="metric-label">📊 Volume ratio</div>
          <div class="metric-val ${volRatio >= 1 ? 'pos' : volRatio < 0.8 ? 'neg' : 'neu'}">${volRatio.toFixed(2)}×</div>
        </div>
      </div>
      <div class="score-row">
        <div class="metric-row">
          <div class="metric-label">Momentum score</div>
          <div class="metric-val" style="color:${barColor}">${fmtPct(score)}</div>
        </div>
        <div class="score-track">
          <div class="score-fill" style="width:${barPct}%;background:${barColor}"></div>
        </div>
      </div>
    </div>`;
}

// ─── Main ─────────────────────────────────────────────────
let allResults = [];

async function refresh() {
  const symbol = document.getElementById('pairSelect').value;
  const grid = document.getElementById('grid');
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot';

  const makerFee = parseFloat(document.getElementById('makerFee').value) || 0.1;
  const takerFee = parseFloat(document.getElementById('takerFee').value) || 0.1;
  const roundTripPct = makerFee + takerFee;

  // Loading state
  grid.innerHTML = TIMEFRAMES.map(tf => `
    <div class="card">
      <div class="card-header"><div class="tf-label">${tf.label}</div>
        <div class="signal-badge loading">loading…</div></div>
      <div style="color:var(--muted);font-size:0.75rem;margin-top:8px">Fetching…</div>
    </div>`).join('') + `<div class="summary-card" style="grid-column:1/-1">
      <div style="color:var(--muted);font-size:0.75rem">Loading all timeframes…</div></div>`;

  allResults = [];
  let cards = '';
  let errors = 0;

  for (const tf of TIMEFRAMES) {
    try {
      const candles = await fetchOHLCV(symbol, tf.interval, tf.limit);
      const physics = calcPhysics(candles);
      const signal = deriveSignal(physics, roundTripPct);
      allResults.push({ tf, physics, signal });
      cards += renderCard(tf, candles, physics, signal, roundTripPct);
    } catch(e) {
      errors++;
      allResults.push({ tf, physics: null, signal: 'hold' });
      cards += `<div class="card">
        <div class="card-header"><div class="tf-label">${tf.label}</div></div>
        <div class="error-msg">❌ ${e.message}</div>
      </div>`;
    }
    await new Promise(r => setTimeout(r, 120));
  }

  // Overall signal: weighted vote
  let buyScore = 0, sellScore = 0;
  for (const r of allResults) {
    if (!r.physics) continue;
    const w = r.tf.weight;
    if (r.signal === 'buy')  buyScore  += w * Math.abs(r.physics.score);
    if (r.signal === 'sell') sellScore += w * Math.abs(r.physics.score);
  }

  const overallScore = buyScore - sellScore;
  let overall, overallClass;
  if (overallScore > roundTripPct * 0.3) { overall = '▲ BUY';  overallClass = 'buy'; }
  else if (overallScore < -roundTripPct * 0.3) { overall = '▼ SELL'; overallClass = 'sell'; }
  else { overall = '— HOLD'; overallClass = 'hold'; }

  // Needed move to cover fees
  const neededMove = roundTripPct.toFixed(3);

  const summaryCard = `
    <div class="summary-card">
      <div class="summary-title">Multi-Timeframe Consensus</div>
      <div class="signal-grid">
        ${allResults.map(r => `
          <div class="sig-cell">
            <div class="tf">${r.tf.label}</div>
            <div class="sig" style="color:${r.signal==='buy'?'var(--green)':r.signal==='sell'?'var(--red)':'var(--muted)'}">
              ${r.signal==='buy'?'▲ BUY':r.signal==='sell'?'▼ SELL':'— HOLD'}
            </div>
          </div>`).join('')}
      </div>
      <div class="overall ${overallClass}">
        <div class="overall-label">CONSENSUS SIGNAL</div>
        <div class="overall-signal ${overallClass}">${overall}</div>
        <div class="overall-detail">
          Weighted momentum: ${overallScore >= 0 ? '+' : ''}${overallScore.toFixed(4)}%
          &nbsp;|&nbsp; Round-trip fee: ${roundTripPct.toFixed(3)}%
        </div>
        <div class="fee-impact">
          Min profitable move: <span class="needed">${neededMove}%</span>
          &nbsp;(buy + sell fees combined)
        </div>
      </div>
    </div>`;

  grid.innerHTML = cards + summaryCard;

  dot.className = errors < TIMEFRAMES.length ? 'status-dot live' : 'status-dot';
  document.getElementById('lastUpdate').textContent =
    `Updated ${new Date().toLocaleTimeString()}`;
}

function recalcFees() {
  const maker = parseFloat(document.getElementById('makerFee').value) || 0;
  const taker = parseFloat(document.getElementById('takerFee').value) || 0;
  const rt = (maker + taker).toFixed(3);
  document.getElementById('roundTrip').textContent = rt + '%';
  document.getElementById('minMove').textContent   = rt + '%';
}

// Init
recalcFees();
</script>
</body>
</html>
